linters:
  enable:
    - errcheck
    - exhaustive
    - goconst
    - gocritic
    - gosec
    - govet
    - revive
    - staticcheck
    - unused

linters-settings:
  exhaustive:
    default-signifies-exhaustive: true
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
      - style
    disabled-checks:
      - hugeParam        # NodeResult/logRecord are value types used throughout; pointer refactor is out of scope
      - commentedOutCode # false-positive on math-explanation comments in tests
  revive:
    rules:
      - name: exported
      - name: var-naming
      - name: error-return
  gosec:
    excludes:
      - G304 # file path from variable — acceptable in CLI tools

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - goconst  # test literals like "prod" are intentional, not candidates for constants
    - path: internal/cluster/fetch\.go
      linters:
        - revive  # ClusterData name is established API; stutter fix would break callers
