---
# ServiceAccount for karpview. Create in the namespace where you run the CLI
# as a Job/Pod, or bind to your own service account by skipping this resource.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: karpview
  namespace: default
---
# ClusterRole grants read-only access to the four resource types karpview
# queries. No write permissions are required.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: karpview
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["list"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["list"]
  # Karpenter >= 1.0 NodeClaim API (karpenter.sh/v1)
  - apiGroups: ["karpenter.sh"]
    resources: ["nodeclaims"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: karpview
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: karpview
subjects:
  - kind: ServiceAccount
    name: karpview
    namespace: default
